<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>面试复习工具集</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { text-align: center; padding: 2rem; }
        h1 { font-size: 2.5rem; color: white; margin-bottom: 2rem; }
        .card-container { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            padding: 2rem;
            width: 280px;
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
        }
        .card:hover { transform: translateY(-8px); }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        .card h2 { font-size: 1.8rem; color: #1e3c72; }
        .card p { color: #2c3e50; }
        footer { margin-top: 3rem; color: rgba(255,255,255,0.6); }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 数学复习工具箱</h1>
    <div class="card-container">
        <div class="card" onclick="location.href='calculus/calculus.html'">
            <div class="icon">📐</div>
            <h2>微积分复习</h2>
            <p>极限、导数、积分、级数、微分方程等</p>
        </div>
        <div class="card" onclick="location.href='operations/operations.html'">
            <div class="icon">📊</div>
            <h2>运筹学复习</h2>
            <p>线性规划、对偶、整数规划、动态规划、图论等</p>
        </div>
    </div>
    <footer>选择你要复习的科目</footer>
</div>
</body>
</html>
